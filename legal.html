function setLang(lang){
  var t=T[lang];
  var html='<h1>'+t.title+'</h1>';
  t.sections.forEach(function(s){html+='<h2>'+s.h+'</h2>'+s.body;});
  document.getElementById('legal-content').innerHTML=html;
  ['btn-de','btn-tr','btn-en'].forEach(function(id){document.getElementById(id).classList.remove('active');});
  document.getElementById('btn-'+lang).classList.add('active');
  document.documentElement.lang=lang;
  document.getElementById('back-btn').textContent=(lang==='tr'?'← Geri':lang==='de'?'← Zurück':'← Back');
}
var ul=(navigator.language||'de').toLowerCase();
if(ul.startsWith('tr'))setLang('tr');
else if(ul.startsWith('en'))setLang('en');
else setLang('de');
